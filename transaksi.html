<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Transaksi</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  
  <body>
    <nav>
  <a href="transaksi.html" class="menu-item active">
    <span class="icon"><img src="img/cart.png"></span>
    <span>Kasir</span>
  </a>
  <a href="inventori.html" class="menu-item">
    <span class="icon"><img src="img/box.png"></span>
    <span>Stok Barang</span>
  </a>
  <a href="managemen.html" class="menu-item">
    <span class="icon"><img src="img/dollar.png"></span>
    <span>Laporan</span>
  </a>
</nav>

      <main class="main-content">
        <header>
          <h2>Management Dashboard</h2>
        </header>

        <div class="product-grid">
          <div class="card">
            <img src="img/kerupukUdang.jpeg" alt="Kerupuk Udang" />
            <div class="card-info">
              <h3>Kerupuk Udang</h3>
              <p class="price">Rp. 12.000</p>
            </div>
          </div>

          <div class="card">
            <img src="img/kerupukBawang.jpeg" alt="Kerupuk Bawang" />
            <div class="card-info">
              <h3>Kerupuk Bawang</h3>
              <p class="price">Rp. 13.000</p>
            </div>
          </div>
        </div>
      </main>
      <aside class="cart-panel">
        <div class="cart-title">Keranjang Belanja</div>
        <div class="cart-items"></div>
        <div class="cart-footer">
          <div class="total">
            <span>Total Harga</span>
            <span>Rp. 0</span>
          </div>
          <button class="btn-bayar">
            <i class="fa-solid fa-money-bill-wave"></i> Bayar
          </button>
        </div>
      </aside>
    </div>
  </body>
</html>
